rate_limits:
  summary: Amobee does not publish explicit numeric rate limits publicly. The Master Service Agreement (Schedule A) states that API clients must not unreasonably burden the Platform API with ad call volume and must honor Amobee's requests to limit request volume. Social publisher integrations (Facebook, Twitter, Instagram, Pinterest, Snapchat) are subject to rate limits imposed by those respective platforms.

  policies:
    - name: General API Usage
      description: API clients connecting directly to the Platform API (https://services.amobee.com/campaign/v3/api) must operate within reasonable volume thresholds. Amobee may request clients to reduce request volume at any time and clients are contractually obligated to comply.
      enforcement: contractual
      source: https://www.amobee.com/trust/master-service-terms/schedule-a/

    - name: Social Publisher API Limits
      description: Amobee's integrations with social publishers (Facebook/Instagram, Twitter, Pinterest, Snapchat) are subject to those platforms' own API rate limits. Amobee passes these limits through to clients using social inventory buying features.
      enforcement: platform
      source: https://www.amobee.com/trust/master-service-terms/schedule-c/

  authentication_endpoint:
    url: https://services.amobee.com/accounts/v1/api/token
    method: POST
    grant_type: client_credentials
    notes: Access tokens are obtained via OAuth2 client credentials flow using client_id and client_secret provisioned by Amobee. Tokens are passed as Bearer tokens in the Authorization header on all Campaign API requests.
